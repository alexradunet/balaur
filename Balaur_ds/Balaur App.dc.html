  <sc-if value="{{ isCandle }}" hint-placeholder-val="{{ true }}">

  {{ dock }}

<script type="text/x-dc" data-dc-script>

  seedQuests() {

      { id:'c3', title:'Raise the new beehive', desc:'A second hive by the lindens, before the summer flow ends.', steps:[{t:'Build the hive boxes',done:true},{t:'Order the queen',done:false},{t:'Settle the swarm',done:false},{t:'First honey harvest',done:false}], reward:'Honey from your own hives.' },
      { id:'c4', title:'Digitize the family archive', desc:'The shoebox of photographs, before the colors go.', steps:[{t:'Sort the shoebox',done:true},{t:'Scan the photographs',done:false},{t:'Label the names and years',done:false},{t:'Copy to the vault disk',done:false}], reward:'The family, kept against time.' },

    const dailies = [

      ['Walk at dusk','dusk',31,true,'A turn around the orchard before the dark settles.','The body remembers the road.'],

    const weeklies = [

    const oneoffs = [

      ['Call the notary about the deed','today · 10:00',0,'Ask about the missing signature page.','The land, settled in your name.'],
      ['Collect the parcel from the post','Jun 13',0],

      ['Take honey to Ana','Jun 14',0],
      ['Book the dentist','Jun 16',0],
      ['Take the car for inspection','Jun 17',0],
      ['Order firewood for autumn','Jun 18',0],
      ['Fix the gutter over the porch','Jun 19',0],

      ['Mend the gate latch','Jun 21',0],
      ['Print the land survey','Jun 22',0],

    const somedays = [
      ['Build a cold frame','Glass over the seedlings; spring comes early under it.','Greens in March.'],
      ['Press apples for cider'],
      ['Learn to whittle spoons'],
      ['Plant a walnut by the road'],
      ['Build a bird table'],
      ['Brew a small mead'],
      ['Map the family tree'],

    return campaigns.concat(dailies, weeklies, oneoffs, somedays);
  }

  state = {
    page: 'board', light: false,
    soul: 'soul-01', head: 'balaur-01', ownerName: 'Alex',
    query: '', filter: 'all',
    folded: { someday: true },
    expanded: {},
    inspect: 'quest', selectedId: 'c1', selectedDay: 12,
    note: null, flareId: null,
    quests: this.seedQuests(),
    messages: [
      { id: 1, role: 'balaur', text: 'I am here. The hearth is lit and your words stay on this box. What shall we weigh today?' },
      { id: 2, role: 'user', text: 'Remind me to water the tomatoes every two days, evenings.' },
      { id: 3, role: 'balaur', text: 'Every second evening at 18:00, then. Shall I hold you to it?' },
      { id: 4, role: 'choices', kind: 'confirmTask' },
    ],
    pending: false,
    sidebarOpen: true,
    sideW: 336,
    soundOn: true,
    lastPage: 'board',
    memories: [
      { id:'m1', status:'proposed', kind:'preference', title:'Prefers Markdown exports', body:'Asked twice for notes as .md files.', used:0 },
      { id:'m2', status:'proposed', kind:'fact', title:'The deed is missing a signature page', body:'Heard at the notary, this morning.', used:0 },
      { id:'m3', status:'kept', kind:'preference', title:'Garden — tomatoes & peppers, watered at dusk', body:'Part of your story since spring.', used:3 },
      { id:'m4', status:'kept', kind:'person', title:'Ana — sister, lives by the coast', body:'Honey for her each month.', used:5 },
      { id:'m5', status:'kept', kind:'ritual', title:'Morning pages before 08:00', body:'Three pages, any words.', used:12 },
    ],
    skills: [
      { name:'calendar & nudges', icon:'bell', used:31 },
      { name:'recall', icon:'tome', used:22 },
      { name:'search the box', icon:'lens', used:14 },
      { name:'measures', icon:'orb', used:9 },
      { name:'journal scribe', icon:'quill', used:7 },
    ],
    heads: [
      { id:'main', name:'The main head', avatar:'balaur-01', skills:['the one conversation'], status:'awake' },
      { id:'steward', name:'The Steward', avatar:'balaur-03', skills:['quests','calendar','nudges'], status:'awake' },
      { id:'scribe', name:'The Scribe', avatar:'balaur-04', skills:['journal','compaction'], status:'wakes at dusk' },
      { id:'archivist', name:'The Archivist', avatar:'balaur-16', skills:['memory','recall'], status:'asleep' },
    ],
    model: 'hearth-7b',
    journal: [
      { id:1, day:'Thu Jun 11', time:'22:10', mode:'guided', text:'The notary found the missing page. I keep waiting for the orchard to fail, and it keeps not failing. Three rows grafted clean.' },
    ],
    jDraft: '', jMode: 'free', jPrompt: 0,
    lifeLines: [ 'Jun 12 06:31 · weight 81.2kg', 'Jun 11 · mood steady, long walk' ],
    openFold: false,
    gridW: 0, palette: false, uid: 100, cardMenu: null,
    activeBoard: 'study',
    boards: [
      { id:'study', name:'Study', cards:[ {cid:'k1',type:'character',x:0,y:0,w:4,h:22},{cid:'k2',type:'today',x:4,y:0,w:4,h:16},{cid:'k3',type:'campaigns',x:4,y:16,w:4,h:12},{cid:'k4',type:'road',x:0,y:22,w:4,h:11} ] },
      { id:'log', name:'Quest log', cards:[ {cid:'k5',type:'quests',x:0,y:0,w:5,h:34},{cid:'k5b',type:'calendar',x:5,y:0,w:3,h:26} ] },
      { id:'self', name:'Self', cards:[ {cid:'k6',type:'identity',x:0,y:0,w:4,h:14},{cid:'k7',type:'stats',x:0,y:14,w:4,h:16},{cid:'k8',type:'mood',x:0,y:30,w:4,h:11},{cid:'k9',type:'souls',x:4,y:0,w:4,h:11},{cid:'k10',type:'weight',x:4,y:11,w:4,h:11},{cid:'k11',type:'ledger',x:4,y:22,w:4,h:11} ] },
      { id:'balaur', name:'Balaur', cards:[ {cid:'k12',type:'companion',x:0,y:0,w:4,h:26},{cid:'k13',type:'skills',x:0,y:26,w:4,h:13},{cid:'k14',type:'memory',x:4,y:0,w:4,h:22},{cid:'k15',type:'heads',x:4,y:22,w:4,h:18} ] },
    ],
  };

  CARD_TYPES = {
    character:{label:'Character',icon:'shield',w:4,h:22}, today:{label:'Today',icon:'scroll',w:4,h:16},
    campaigns:{label:'Campaign',icon:'key',w:4,h:12}, road:{label:'Road ahead',icon:'hourglass',w:4,h:11},
    quests:{label:'Quest log',icon:'scroll',w:8,h:34}, calendar:{label:'Calendar',icon:'hourglass',w:4,h:26}, timeline:{label:'Timeline',icon:'hourglass',w:8,h:28}, journal:{label:'Journal',icon:'quill',w:4,h:18},
    identity:{label:'Identity',icon:'shield',w:4,h:14}, souls:{label:'Soul portrait',icon:'shield',w:4,h:11}, stats:{label:'Measures',icon:'orb',w:4,h:16},
    weight:{label:'Weight',icon:'orb',w:4,h:11}, mood:{label:'Mood',icon:'orb',w:4,h:11}, ledger:{label:'Recent lines',icon:'orb',w:4,h:11},
    companion:{label:'Companion',icon:'tome',w:4,h:26}, skills:{label:'Skills',icon:'key',w:4,h:13}, memory:{label:'Memory',icon:'tome',w:4,h:22}, heads:{label:'Heads',icon:'tome',w:4,h:18},
  };

  JPROMPTS = [
    'What did today ask of you, and what did you answer?',
    'Name one thing the orchard taught you this week.',
    'What waits unspoken on the book?',
    'Where did your word hold; where did it bend?',
  ];

  CATS = [
    { key:'campaign', label:'Campaign', icon:'key', sub:'the main story' },
    { key:'daily', label:'Dailies', icon:'flame', sub:'reset each dawn' },
    { key:'weekly', label:'Weeklies', icon:'hourglass', sub:'reset on Monday' },
    { key:'oneoff', label:'Quests', icon:'scroll', sub:'one-off' },
    { key:'someday', label:'Side quests', icon:'gem', sub:'no date' },
  ];

  CHOICES = {
    confirmTask: [
      { label: 'Hold me to it.', hint: 'add recurring task', kind: 'hold' },
      { label: 'Just this once.', hint: 'add one-time task', kind: 'once' },
      { label: 'Let it be.', hint: 'cancel', kind: 'cancel' },
    ],
    memory: [
      { label: 'Keep it.', hint: 'approve memory', kind: 'approve' },
      { label: 'Not this.', hint: 'dismiss', kind: 'dismiss' },
      { label: 'Ask me another time.', hint: 'later', kind: 'later' },
    ],
    nudge: [
      { label: 'It is done.', hint: 'mark done', kind: 'done' },
      { label: 'At nightfall.', hint: 'snooze · 21:00', kind: 'tonight' },
      { label: 'Tomorrow, I swear it.', hint: 'snooze · tomorrow', kind: 'tomorrow' },
      { label: 'Let this one go.', hint: 'drop task', kind: 'drop' },
    ],
  };

  ns = () => window.BalaurBasmDesignSystem_0c1b20;

  componentDidMount() {
    this.applyTheme();
    this._timers = [];
    document.addEventListener('keydown', this.onKey);
    document.addEventListener('mousedown', this.onDocDown);
    window.addEventListener('resize', this.measureGrid);
    document.documentElement.style.setProperty('--sidebar-w', this.state.sideW+'px');
    try {
      const raw = JSON.parse(localStorage.getItem('balaur-boards'));
      const act = localStorage.getItem('balaur-active');
      if (Array.isArray(raw) && raw.length) {
        // one-time migration: the calendar moved out of the quest log into its own card
        if (!localStorage.getItem('balaur-cal-mig')) {
          const hasCal = raw.some(b=>b.cards && b.cards.some(c=>c.type==='calendar'));
          if (!hasCal) { const tgt = raw.find(b=>b.id==='log') || raw.find(b=>b.cards.some(c=>c.type==='quests')) || raw[0]; tgt.cards = this.gPack(tgt.cards.concat([{ cid:this.uid(), type:'calendar', x:5, y:0, w:3, h:26 }]), null); }
          try { localStorage.setItem('balaur-cal-mig','1'); } catch(e) {}
        }
        // one-time: give the quest-log card full width so its detail has room
        if (!localStorage.getItem('balaur-ql-wide')) {
          raw.forEach(b=>{ if(b.cards){ b.cards.forEach(c=>{ if(c.type==='quests' && c.w<8){ c.x=0; c.w=8; } }); b.cards = this.gPack(b.cards, null); } });
          try { localStorage.setItem('balaur-ql-wide','1'); } catch(e) {}
        }
        this.setState({ boards: raw, activeBoard: (act && raw.some(b=>b.id===act)) ? act : raw[0].id }, this.saveBoards);
      }
    } catch(e) {}
    if (!this.ns()) {
      this._poll = setInterval(()=>{ if (this.ns()) { clearInterval(this._poll); this.forceUpdate(); } }, 120);
    }
  }
  componentWillUnmount() { (this._timers||[]).forEach(clearTimeout); clearInterval(this._poll); document.removeEventListener('keydown', this.onKey); document.removeEventListener('mousedown', this.onDocDown); window.removeEventListener('resize', this.measureGrid); this.stopAmbient(); }
  onDocDown = (e) => { if (this.state.cardMenu && !(e.target.closest && e.target.closest('[data-cardmenu]'))) this.setState({ cardMenu:null }); };
  componentDidUpdate(prevProps, prevState) {
    document.documentElement.style.setProperty('--sidebar-w', this.state.sideW+'px');
    this.measureGrid();
    if (!prevState || prevState.messages === this.state.messages) return;
    if (this.state.page==='immersive') window.scrollTo(0, document.body.scrollHeight);
    if (this._sideEl) this._sideEl.scrollTop = this._sideEl.scrollHeight;
  }
  startDrag = (e) => {
    e.preventDefault();
    document.body.style.userSelect = 'none';
    document.addEventListener('mousemove', this.onDrag);
    document.addEventListener('mouseup', this.endDrag);
  };
  onDrag = (e) => {
    const w = Math.min(Math.max(window.innerWidth - e.clientX, 280), Math.min(960, window.innerWidth - 320));
    this.setState({ sideW: w });
  };
  endDrag = () => {
    document.body.style.userSelect = '';
    document.removeEventListener('mousemove', this.onDrag);
    document.removeEventListener('mouseup', this.endDrag);
  };
  applyTheme() {
    const r = document.documentElement;
    r.classList.toggle('light', this.state.light);
    r.classList.toggle('dark', !this.state.light);
  }

  ic = (name, size, extra) => React.createElement('img', { src:'assets/icons/'+name+'.png', alt:'', style: Object.assign({ width:size, height:size, imageRendering:'pixelated', flexShrink:0 }, extra||{}) });

  setNote = (text) => { this.setState({ note:text }); clearTimeout(this._nt); this._nt = setTimeout(()=>this.setState({ note:null }), 3200); };
  flare = (id) => { this.setState({ flareId:id }); clearTimeout(this._ft); this._ft = setTimeout(()=>this.setState({ flareId:null }), 1600); };
  selectQuest = (id) => this.setState({ selectedId:id });
  selectDay = (d) => this.setState({ selectedDay:d });
  toggleFold = (cat) => this.setState(s=>({ folded:Object.assign({},s.folded,{ [cat]:!s.folded[cat] }) }));
  toggleExpand = (cat) => this.setState(s=>({ expanded:Object.assign({},s.expanded,{ [cat]:!s.expanded[cat] }) }));

  toggleDone = (q) => {
    const becoming = !q.doneToday;
    this.setState(s=>({ quests:s.quests.map(x=>x.id===q.id?Object.assign({},x,{ doneToday:becoming, streak: becoming ? x.streak+1 : Math.max(0,x.streak-1) }):x) }));
    if (becoming) { this.setNote('Kept. “'+q.title+'”'+(q.reward?' — '+q.reward:'')); this.flare(q.id); }
  };
  complete = (q) => {
    this.setState(s=>({ quests:s.quests.map(x=>x.id===q.id?Object.assign({},x,{ status:'done' }):x) }));
    this.setNote('Done. “'+q.title+'”'+(q.reward?' — '+q.reward:'')); this.flare(q.id);
  };
  abandon = (q) => {
    this.setState(s=>({ quests:s.quests.map(x=>x.id===q.id?Object.assign({},x,{ status:'dropped' }):x) }));
    this.setNote('Let it go. “'+q.title+'” leaves the log.');
  };
  snooze = (q) => this.setNote('Set aside. I shall raise “'+q.title+'” again tomorrow.');
  toggleStep = (q, i) => this.setState(s=>({ quests:s.quests.map(x=>{ if(x.id!==q.id) return x; return Object.assign({},x,{ steps:x.steps.map((st,j)=>j===i?Object.assign({},st,{done:!st.done}):st) }); }) }));
  advance = (q) => {
    const i = q.steps.findIndex(st=>!st.done);
    if (i < 0) return;
    const cleared = q.steps.filter(st=>st.done).length + 1;
    if (cleared >= q.steps.length) {
      this.setState(s=>({ quests:s.quests.map(x=>x.id===q.id?Object.assign({},x,{ status:'done', steps:x.steps.map(st=>Object.assign({},st,{done:true})) }):x) }));
      this.setNote('The quest is complete. “'+q.title+'”'+(q.reward?' — '+q.reward:'')); this.flare(q.id);
    } else {
      this.toggleStep(q, i);
      this.setNote('A step done. '+cleared+' of '+q.steps.length+' cleared on “'+q.title+'”.');
    }
  };
  addQuest = (text) => {
    const dated = /\b(today|tonight|tomorrow|mon|tue|wed|thu|fri|sat|sun|jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec|evening|morning|noon)\b|\d{1,2}:\d{2}/i.test(text);
    const id = 'n'+Date.now();
    const q = { id, cat: dated?'oneoff':'someday', title: text.trim().charAt(0).toUpperCase()+text.trim().slice(1), desc:'You set this down yourself.', due: dated?'soon':undefined, reward:'A thing you meant to do, done.', status:'active' };
    this.setState(s=>({ quests:[q].concat(s.quests), selectedId:id, inspect:'quest', filter:'all', query:'' }));
    this.flare(id);
    return q;
  };

  // ── Conversation engine ───────────────────────────────────────────
  revealMs = (t) => Math.min(t.length * 14 + 500, 3200);
  HEADAV = { steward:'balaur-03', scribe:'balaur-04', archivist:'balaur-16', main:'balaur-01' };
  toolHeadAv = (tool) => { if (!tool) return null; const h = tool.split(' · ')[0]; return this.HEADAV[h] ? 'assets/avatars/'+this.HEADAV[h]+'.png' : null; };
  headByTool = (tool) => {
    if (!tool) return null;
    if (tool.indexOf('memory')===0) return 'archivist';
    if (tool.indexOf('journal')===0) return 'scribe';
    if (tool.indexOf('task')===0 || tool.indexOf('life')===0) return 'steward';
    return null;
  };
  push = (msg, delay) => {
    this._mid = this._mid || 100;
    const id = this._mid++;
    const dec = Object.assign({ id, ts: Date.now() }, msg);
    if (dec.role==='tool' && dec.tool && dec.tool.indexOf('·')<0) { const h = this.headByTool(dec.tool); if (h) dec.tool = h+' · '+dec.tool; }
    const t = setTimeout(()=>{ this.setState(s=>({ messages:s.messages.concat([dec]) })); if (msg.role==='balaur') this.sndArrive(); }, delay||0);
    (this._timers = this._timers || []).push(t);
  };
  speak = (choice) => {
    this.setState(s=>({ messages:s.messages.filter(x=>x.role!=='choices') }));
    this.push({ role:'user', text:choice.label });
    this.sndPick();
  };
  matchChoice = (text, choices) => {
    const t = text.trim().toLowerCase().replace(/[.!]$/,'');
    if (/^[1-9]$/.test(t)) return choices[parseInt(t,10)-1] || null;
    return choices.find(c=>{
      const l = c.label.toLowerCase().replace(/[.!]$/,'');
      return l===t || l.includes(t) || t.includes(l) || (c.hint && c.hint.toLowerCase().includes(t));
    }) || null;
  };

  askMemory = (after) => {
    const q = 'You speak of the garden often. Shall I remember it as yours to tend — tomatoes and peppers, watered at dusk?';
    this._memText = 'Garden — tomatoes & peppers, watered at dusk';
    this.push({ role:'balaur', text:q, reveal:true }, after);
    this.push({ role:'choices', kind:'memory' }, after + this.revealMs(q));
  };
  sendNudge = (after) => {
    const q = 'The evening comes, and the tomatoes thirst. Will you tend them now?';
    this.push({ role:'balaur', text:q, reveal:true, origin:'nudge' }, after);
    this.push({ role:'choices', kind:'nudge' }, after + this.revealMs(q));
  };
  onConfirmTask = (choice) => {
    this.speak(choice);
    if (choice.kind==='cancel') { this.push({ role:'balaur', text:'Then I shall not speak of it again.', reveal:true }, 500); return; }
    const once = choice.kind==='once';
    this.push({ role:'task', once }, 520);
    const line = once ? 'Once, then. Today at 18:00 — I shall speak of it when the hour comes.' : 'It is written. I shall nudge you every second evening; the first falls today at 18:00.';
    this.push({ role:'balaur', text:line, reveal:true }, 950);
    this.askMemory(950 + this.revealMs(line) + 600);
  };
  onMemory = (choice) => {
    this.speak(choice);
    const kept = this._memText || 'the matter';
    if (choice.kind==='approve') {
      this.setState(s=>({ memories:s.memories.concat([{ id:'mm'+Date.now(), status:'kept', kind:'note', title:kept, body:'Kept from the conversation.', used:0 }]) }));
      this.push({ role:'tool', tool:'memory_keep', icon:'tome', text:'memory kept: "'+kept+'" · importance 3' }, 500);
      this.push({ role:'balaur', text:'Then it is written. It is part of your story now.', reveal:true }, 800);
      if (!this._nudged) { this._nudged = true; this.sendNudge(800 + 1800); }
    } else if (choice.kind==='dismiss') {

  sendText = (text) => {

      const name = (nm||'New board').replace(/["']/g,'').trim();

  boardView = () => React.createElement(React.Fragment, null,

    React.createElement('div', { style:{ height:90 } }));

  dupCard = (cid) => { const src = this.activeB().cards.find(c=>c.cid===cid); if(!src) return; const copy = Object.assign({}, src, { cid:this.uid(), x:0, y:this.bottomY(this.activeB().cards) }); this.setState({ cardMenu:null }); this.setBoards(cards=>{ cards.push(copy); return this.gPack(cards, copy.cid); }); };

      React.createElement('div', { style:{ textAlign:'center', fontFamily:'var(--font-mono)', fontSize:10, color:'var(--ink-muted)' } }, 'the conversation, immersive · with sound'),
      React.createElement('div', { style:{ display:'flex', alignItems:'center', gap:7, justifyContent:'center', borderTop:'2px dotted var(--parch-edge)', paddingTop:10, marginTop:4 } },
        this.ic('shield',15),

      React.createElement('div', { className:'kcard-kind' }, 'Today'),

        this.ic('scroll',16), q.title, React.createElement('span', { style:{ marginLeft:'auto', fontFamily:'var(--font-mono)', fontSize:11.5, color:'var(--ink-muted)' } }, q.due))),

        dailies.map(q=>React.createElement('div', { key:q.id, style:{ display:'flex', alignItems:'center', gap:9, padding:'3px 0', opacity:q.doneToday?0.6:1 } },
          this.questBox(q),
          React.createElement('span', { style:{ flex:1, minWidth:0, fontSize:14.5, color:'var(--ink)', textDecoration:q.doneToday?'line-through':'none', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' } }, q.title),

  }
