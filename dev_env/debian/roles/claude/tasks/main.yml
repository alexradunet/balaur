---
- name: Check whether Claude Code is installed
  ansible.builtin.stat:
    path: "{{ local_bin }}/claude"
  register: claude_bin
  check_mode: false

- name: Install Claude Code (native, user-local)
  when:
    - claude_install | bool
    - not claude_bin.stat.exists
  block:
    - name: Download the Claude Code installer
      ansible.builtin.get_url:
        url: https://claude.ai/install.sh
        dest: /tmp/claude-install.sh
        mode: "0755"
      retries: 3
      delay: 3

    - name: Run the Claude Code installer
      ansible.builtin.command:
        cmd: /bin/bash /tmp/claude-install.sh
        creates: "{{ local_bin }}/claude"

- name: Show the Claude Code version
  ansible.builtin.command: "{{ local_bin }}/claude --version"
  register: cc_ver
  changed_when: false
  failed_when: false
  check_mode: false
  when: claude_install | bool

- name: Report Claude Code
  ansible.builtin.debug:
    msg: "Claude Code {{ cc_ver.stdout | default('(not installed)') }}"
  when: claude_install | bool
