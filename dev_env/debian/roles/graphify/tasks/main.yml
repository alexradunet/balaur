---
# graphify is the repo's knowledge-graph CLI (PyPI package `graphifyy`, command
# `graphify`). Installed via pipx because Debian's system Python is PEP-668
# externally-managed — a plain `pip install` is refused. This makes the repo's
# graphify PreToolUse hooks actually work.
- name: Install pipx
  become: true
  tags: [privileged, graphify]
  ansible.builtin.apt:
    name: pipx
    state: present

- name: Install graphify (graphifyy) via pipx
  ansible.builtin.command: pipx install graphifyy
  args:
    creates: "{{ local_bin }}/graphify"
  environment:
    PATH: "{{ local_bin }}:{{ ansible_env.PATH }}"

- name: Install graphify git hooks in the repo (auto-refresh on commit)
  ansible.builtin.command: graphify --install-hooks
  args:
    chdir: "{{ balaur_repo }}"
  environment:
    PATH: "{{ local_bin }}:{{ ansible_env.PATH }}"
  when: graphify_install_hooks | bool
  changed_when: true

- name: Show the graphify version
  ansible.builtin.command: graphify --version
  register: graphify_ver
  changed_when: false
  failed_when: false
  environment:
    PATH: "{{ local_bin }}:{{ ansible_env.PATH }}"

- name: Report graphify
  ansible.builtin.debug:
    msg: "graphify {{ graphify_ver.stdout | default('(installed)') }}"
