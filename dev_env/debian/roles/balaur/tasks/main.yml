---
# The playbook lives inside the balaur repo, so {{ balaur_repo }} is already
# checked out. This role wires the repo's own make targets — it does NOT
# re-template anything. It NEVER downloads the llama.cpp runtime or GGUF models
# (those are owner-installed via the Models page); it only creates their dirs.
#
# There is no daemon: Balaur runs in the foreground via `make run` (prod, real
# data dir on :8080) or `make dev` (hot-reload, throwaway repo pb_data on :8090),
# kept alive inside a long-lived zellij session. BALAUR_ALLOWED_HOSTS for mesh
# access ships as a default in the repo Makefile, so there is no env file to seed.

- name: Create Balaur data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ data_dir }}/pb_data"
    - "{{ data_dir }}/models"
    - "{{ data_dir }}/kronk/lib"

- name: Activate the repo pre-commit hook (.githooks)
  community.general.git_config:
    name: core.hooksPath
    scope: local
    repo: "{{ balaur_repo }}"
    value: .githooks

- name: Verify the CGO-free build (`make build`)
  ansible.builtin.command: make build
  args:
    chdir: "{{ balaur_repo }}"
    creates: "{{ balaur_repo }}/balaur"
  environment: "{{ go_env }}"
  when: balaur_build | bool

# Linger keeps the owner's zellij server (and the `make run` inside it) alive
# after SSH logout and across reboots, without a system service.
- name: Enable lingering so the zellij session survives logout
  become: true
  ansible.builtin.command: "loginctl enable-linger {{ ansible_user_id }}"
  args:
    creates: "/var/lib/systemd/linger/{{ ansible_user_id }}"

- name: Next steps
  ansible.builtin.debug:
    msg:
      - "Balaur has no daemon. Start it in a zellij session:"
      - "  cd {{ balaur_repo }} && zellij    then  make run   (prod, :8080)"
      - "  hot-reload dev loop instead:       make dev   (:8090)"
