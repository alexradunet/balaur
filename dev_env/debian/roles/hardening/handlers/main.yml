---
- name: Reload ssh
  become: true
  ansible.builtin.systemd_service:
    name: ssh
    state: reloaded

- name: Restart fail2ban
  become: true
  ansible.builtin.systemd_service:
    name: fail2ban
    state: restarted

- name: Reload sysctl
  become: true
  ansible.builtin.command: sysctl --system
  changed_when: true
