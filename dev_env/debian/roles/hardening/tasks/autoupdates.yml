---
- name: Install unattended-upgrades
  become: true
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present

- name: Enable periodic apt update + unattended upgrade
  become: true
  ansible.builtin.template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: "0644"

- name: Configure the automatic security reboot
  become: true
  ansible.builtin.template:
    src: 52-autoreboot.conf.j2
    dest: /etc/apt/apt.conf.d/52-autoreboot.conf
    mode: "0644"

- name: Enable the unattended-upgrades service
  become: true
  ansible.builtin.systemd_service:
    name: unattended-upgrades
    enabled: true
    state: started
