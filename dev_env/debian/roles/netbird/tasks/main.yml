---
# Make the box a NetBird peer (see docs/netbird.md). The official script adds
# the apt repo, installs `netbird`, and enables its systemd daemon. Default-deny
# ufw does NOT block NetBird — it's outbound-initiated WireGuard.
- name: Check whether NetBird is installed
  ansible.builtin.command: command -v netbird
  register: netbird_bin
  failed_when: false
  changed_when: false

- name: Install NetBird (official apt-repo script)
  become: true
  tags: [privileged]
  ansible.builtin.shell:
    cmd: "set -o pipefail; curl -fsSL https://pkgs.netbird.io/install.sh | sh"
    executable: /bin/bash
  when: netbird_bin.rc != 0
  changed_when: true

- name: Check the NetBird connection status
  become: true
  ansible.builtin.command: netbird status
  register: nb_status
  failed_when: false
  changed_when: false

- name: Join the NetBird network (setup key)
  become: true
  ansible.builtin.command: "netbird up --setup-key {{ netbird_setup_key }}"
  when:
    - netbird_setup_key | length > 0
    - "'Management: Connected' not in (nb_status.stdout | default(''))"
  no_log: true
  changed_when: true

- name: NetBird reminder
  ansible.builtin.debug:
    msg: >-
      {{ 'NetBird connected — see `netbird status` for the overlay IP/FQDN, then set'
         + ' balaur_allowed_hosts and re-run -t balaur,netbird.'
         if ('Connected' in (nb_status.stdout | default('')) or netbird_setup_key | length > 0)
         else 'NetBird installed. Join with: sudo netbird up  (SSO) or pass -e netbird_setup_key=...' }}
