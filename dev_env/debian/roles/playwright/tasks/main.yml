---
# Chromium's runtime libraries (Debian 13 / trixie t64 names — the non-t64
# names won't install on trixie). Explicit list rather than
# `playwright install --with-deps`, whose internal sudo hangs non-interactively.
- name: Install Chromium system libraries
  become: true
  tags: [privileged, playwright]
  ansible.builtin.apt:
    name:
      - libnss3
      - libnspr4
      - libatk1.0-0t64
      - libatk-bridge2.0-0t64
      - libatspi2.0-0t64
      - libcups2t64
      - libasound2t64
      - libglib2.0-0t64
      - libgtk-3-0t64
      - libgbm1
      - libdrm2
      - libxkbcommon0
      - libxcomposite1
      - libxdamage1
      - libxfixes3
      - libxrandr2
      - libxext6
      - libx11-6
      - libxcb1
      - libxrender1
      - libxi6
      - libxtst6
      - libpango-1.0-0
      - libcairo2
      - libwayland-client0
      - fonts-liberation
      - fonts-noto-color-emoji
    state: present

- name: Install the Playwright Chromium browser (user-local)
  ansible.builtin.command: npx --yes playwright install chromium
  args:
    creates: "{{ ansible_env.HOME }}/.cache/ms-playwright"
  environment:
    PATH: "/usr/bin:{{ ansible_env.PATH }}"
