<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/basm.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">ᗅ Balaur</a>
    <nav>
      <a href="/memory">Memory</a>
      <a href="/skills">Skills</a>
      <a href="/_/" target="_blank" rel="noopener noreferrer">Engine room</a>
    </nav>
  </header>

  <main>
    {{if .HasRecap}}
    <div id="recap" class="recap-zone"
         hx-get="/ui/recap/bands" hx-trigger="revealed" hx-swap="outerHTML">
      <p class="recap-hint">◇ further back…</p>
    </div>
    {{end}}
    <section class="chat" id="chat" aria-live="polite">
      {{if .History}}
        {{template "chat-messages.html" .History}}
      {{else}}
      <div class="msg msg-balaur">
        <div class="who">Balaur</div>
        <div class="body">I am here. The hearth is lit and your words stay on this box. What shall we weigh today?</div>
      </div>
      {{end}}
    </section>
  </main>
  <script>
    // Open on the present: the chat bottom is "now"; the past is above.
    addEventListener("DOMContentLoaded", () => scrollTo(0, document.body.scrollHeight));
  </script>

  <div class="chatbar">
    <form hx-post="/ui/chat" hx-target="#chat" hx-swap="beforeend" hx-on::after-request="this.reset()">
      <input type="text" name="message" placeholder="Speak with Balaur…" autocomplete="off" autofocus required>
      <button class="btn btn-primary" type="submit">Send</button>
    </form>
  </div>
</body>
</html>
