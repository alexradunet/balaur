<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · Balaur</title>
  <link rel="stylesheet" href="/static/basm.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">ᗅ Balaur</a>
    <nav>
      <a href="/models">Models</a>
      <a href="/memory">Memory</a>
      <a href="/skills">Skills</a>
      <a href="/_/" target="_blank" rel="noopener noreferrer">Engine room</a>
    </nav>
  </header>

  <main>
    {{if .DevSeed}}
    <section class="dev-panel">
      <div>
        <h1>Models</h1>
        <p class="k-sub">Development seed controls are enabled.</p>
      </div>
      <form hx-post="/ui/dev/seed-recaps" hx-target="#seed-result" hx-swap="innerHTML">
        <button class="btn btn-ghost" type="submit">Seed recap demo</button>
      </form>
    </section>
    <div id="seed-result"></div>
    {{end}}
    {{template "models_panel" .}}
  </main>
</body>
</html>
